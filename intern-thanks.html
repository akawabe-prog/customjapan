<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>エントリー完了 | 長期インターン | 株式会社カスタムジャパン</title>
<meta name="robots" content="noindex,follow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;800&family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{--c-red:#c91e1d;--c-blue:#00468c;--c-dark:#101216;--c-off:#f5f6f7;--c-line:#e3e5e8;--c-gray:#7a8290}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:"Noto Sans JP",sans-serif;color:var(--c-dark);background:var(--c-off);
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:8vh 6vw;line-height:1.8}
  .card{background:#fff;border:1px solid var(--c-line);border-radius:20px;max-width:600px;width:100%;
    padding:clamp(40px,7vw,72px) clamp(28px,6vw,64px);text-align:center;box-shadow:0 20px 50px rgba(16,18,22,.06)}
  .eyebrow{font-family:"Manrope",sans-serif;font-weight:800;font-size:12px;letter-spacing:.28em;color:var(--c-red);margin-bottom:20px}
  .check{width:64px;height:64px;border-radius:50%;background:var(--c-red);display:flex;align-items:center;justify-content:center;margin:0 auto 26px}
  .check svg{width:30px;height:30px;stroke:#fff;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}
  h1{font-size:clamp(22px,3.4vw,30px);font-weight:900;letter-spacing:.02em;margin-bottom:18px;line-height:1.5}
  p{font-size:14px;color:#3c4149;margin-bottom:12px}
  .contact{font-size:12.5px;color:var(--c-gray);margin:22px 0 34px}
  .actions{display:flex;flex-wrap:wrap;gap:12px;justify-content:center}
  .btn{display:inline-block;font-family:"Manrope",sans-serif;font-weight:800;font-size:13px;letter-spacing:.08em;
    text-decoration:none;border-radius:100px;padding:14px 30px;transition:transform .3s,box-shadow .3s,background .3s}
  .btn-solid{background:var(--c-red);color:#fff}
  .btn-solid:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(201,30,29,.28)}
  .btn-line{border:1px solid var(--c-line);color:var(--c-dark)}
  .btn-line:hover{border-color:var(--c-dark)}
</style>
</head>
<body>
  <div class="card">
    <p class="eyebrow">INTERNSHIP 2026</p>
    <div class="check" aria-hidden="true"><svg viewBox="0 0 24 24"><polyline points="5 13 10 18 19 6"></polyline></svg></div>
    <h1 id="tkTitle">エントリーありがとうございます</h1>
    <p id="tkMsg">長期インターンへのご応募を受け付けました。<br>内容を確認のうえ、担当者より数日以内にご連絡いたします。</p>
    <p class="contact">お急ぎの場合 : recruit@customjapan.jp / TEL 06-6563-9317（平日 9:00–18:00）</p>
    <div class="actions">
      <a href="index.html" class="btn btn-solid">インターンページへ戻る</a>
      <a href="index.html" class="btn btn-line">TOPへ</a>
    </div>
  </div>
  <script>
    (function(){
      if(new URLSearchParams(location.search).get('type')==='casual'){
        document.getElementById('tkTitle').textContent='カジュアル面談のお申し込みを受け付けました';
        document.getElementById('tkMsg').innerHTML='ありがとうございます。担当者より、面談日程についてメールでご連絡いたします。<br>「何を話せばいいか分からない」でも大丈夫。当日は気軽にお越しください。';
      }
    })();
  </script>
</body>
</html>
